kind = "web"
previewPath = "/"
title = "TrueStage DataBridge"
version = "1.0.0"
id = "artifacts/truestage-databridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25489

[services.development]
run = "pnpm --filter @workspace/truestage-databridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truestage-databridge", "run", "build" ]
publicDir = "artifacts/truestage-databridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25489"
BASE_PATH = "/"
